<form [formGroup]="serieForm" (ngSubmit)="onSubmit()">
    <label for="nom">Nom de la série</label>
    <input type="text" id="nom" formControlName="nom" placeholder="Nom de la série">

    <label for="statutSerie">Statut de la série</label>
    <select id="statutSerie" formControlName="statutSerie">
        <option value="ABANDONNEE">Abandonnée</option>
        <option value="EN_COURS">En cours</option>
        <option value="TERMINEE">Terminée</option>
    </select>

    <label for="nombreLivreTotal">Nombre de livre dans la série</label>
    <input type="number" id="nombreLivreTotal" formControlName="nombreLivreTotal">

    <button type="submit">Créer</button>

</form>
