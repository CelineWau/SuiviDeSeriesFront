<a routerLink="/series/creer" class="btn-dragon">Créer une série à suivre</a>

<h2 class="seriesEnCours">Séries en cours</h2>
<div class="liste-series">
    @for (serie of seriesEnCours; track serie.idSerie) {
        <app-serie-item
            [serie]="serie"
            (serieModifiee)="chargerSeries()"
            (supprimerSerie)="supprimer($any($event))">
            </app-serie-item>
    }
</div>
