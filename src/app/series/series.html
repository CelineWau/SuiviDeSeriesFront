<div class="liste-series">
    @for (serie of series; track serie.idSerie) {
        <div class="serie-ligne">
            <div class="serie-info">
                <span>{{ serie.nom }}</span>
                <a [routerLink]="['/livres/creer', serie.idSerie]" class="btn-livre">+ Livre</a>
                <button (click)="supprimer(serie.idSerie)" class="btn-supprimer">X</button>
            </div>
            <div class="carrés">
                @for (carre of getCarreaux(serie.nombreLivreTotal, serie.livres); track $index) {
                <span>{{ carre }}</span>
                }
            </div>

        </div>
    }
</div>


<a routerLink="/series/creer" class="btn-dragon">Créer une série à suivre</a>
